name: Run checks

permissions:
  # Required for actions/checkout (access to source code).
  contents: read

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main

# Cancel previous runs if the PR is updated before completion.
concurrency:
  group: ${{ github.ref }}-check
  cancel-in-progress: true

jobs:
  run-checks:
    timeout-minutes: 60
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - name: Install linux packages
      run: ./setup-linters.sh
    - name: check shell scripts
      run: shellcheck setup-env.sh install-cmake.sh install-valgrind.sh setup-linters.sh
    - name: script permissions
      run: chmod +x ./setup-env.sh ./install-cmake.sh ./install-valgrind.sh
    - name: lint code
      run: git ls-files '*.cpp' '*.h' | xargs clang-format-20 --dry-run --Werror -style=file
    - name: Install dependencies
      run: ./setup-env.sh
    - name: Install cmake
      run: ./install-cmake.sh
    - name: Install valgrind
      run: ./install-valgrind.sh
    - name: Create build files
      run: cmake .
    - name: Build application
      run: cmake --build . --target install
    - name: Run tests
      run: ./tests/unit_tests
    - name: Run valgrind
      run: valgrind -s --error-exitcode=1 --tool=memcheck --leak-check=full ./tests/unit_tests
